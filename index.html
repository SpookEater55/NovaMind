<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaMind • AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');
        body { font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .apple-nav { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); }
        .chat-bubble { max-width: 75%; }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-900">

    <!-- Apple Navigation -->
    <nav class="apple-nav sticky top-0 z-50 border-b border-neutral-200">
        <div class="max-w-screen-2xl mx-auto px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="text-3xl font-semibold tracking-tight text-black">NovaMind</div>
                <span class="text-xs bg-blue-100 text-blue-600 px-3 py-1 rounded-full font-medium">Llama 3.2</span>
            </div>
            <div class="flex gap-8 text-sm font-medium">
                <a href="#" class="hover:text-black">Dashboard</a>
                <a href="#" class="hover:text-black">Tasks</a>
                <a href="#" class="hover:text-black">Front Desk</a>
                <a href="#" class="hover:text-black">Files</a>
            </div>
            <div class="text-sm text-neutral-500">Local AI • Connected</div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto flex h-[calc(100vh-73px)]">
        <!-- Sidebar -->
        <div class="w-80 border-r border-neutral-200 bg-white p-6">
            <h2 class="font-semibold mb-6">NovaMind Assistant</h2>
            <div onclick="newChat()" class="flex items-center gap-3 p-4 hover:bg-neutral-100 rounded-2xl cursor-pointer">
                <i class="fa-solid fa-plus"></i>
                <span>New Conversation</span>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="flex-1 flex flex-col">
            <div id="chat-window" class="flex-1 overflow-auto p-8 space-y-8 bg-neutral-50">
                <!-- Welcome Message -->
                <div class="max-w-2xl">
                    <p class="text-3xl font-medium">Hello, I'm NovaMind.</p>
                    <p class="text-neutral-600 mt-3">How can I help you today? I can manage tasks, automate front desk work, create files, and more.</p>
                </div>
            </div>

            <!-- Input -->
            <div class="p-6 border-t bg-white">
                <div class="max-w-3xl mx-auto relative">
                    <input id="user-input" type="text" 
                           class="w-full bg-neutral-100 border border-neutral-300 rounded-3xl px-8 py-6 text-lg outline-none focus:border-blue-500"
                           placeholder="Ask me anything... (e.g. Create a welcome email for new guest)">
                    <button onclick="sendMessage()" 
                            class="absolute right-4 top-1/2 -translate-y-1/2 bg-black text-white px-8 py-4 rounded-3xl hover:bg-neutral-800">
                        Send
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message, 'user');
            input.value = '';

            // Simulate thinking
            setTimeout(() => {
                const response = getAIResponse(message);
                addMessage(response, 'ai');
            }, 800);
        }

        function addMessage(text, sender) {
            const chat = document.getElementById('chat-window');
            const bubble = document.createElement('div');
            
            if (sender === 'user') {
                bubble.className = 'flex justify-end';
                bubble.innerHTML = `
                    <div class="chat-bubble bg-blue-600 text-white px-6 py-4 rounded-3xl rounded-br-none">
                        ${text}
                    </div>
                `;
            } else {
                bubble.className = 'flex justify-start';
                bubble.innerHTML = `
                    <div class="chat-bubble bg-white border border-neutral-200 px-6 py-4 rounded-3xl rounded-bl-none">
                        ${text}
                    </div>
                `;
            }
            chat.appendChild(bubble);
            chat.scrollTop = chat.scrollHeight;
        }

        function getAIResponse(prompt) {
            const lower = prompt.toLowerCase();
            
            if (lower.includes("front desk") || lower.includes("guest") || lower.includes("welcome")) {
                return `✅ Created welcome email for new guest.<br><br>
                        <strong>Subject:</strong> Welcome to Our Hotel!<br>
                        <strong>Body:</strong> Dear Guest, We're excited to have you...`;
            }
            if (lower.includes("create file") || lower.includes("make file")) {
                return `📄 File created: <strong>Task_Report_2026.md</strong><br><br>Would you like me to generate more files?`;
            }
            if (lower.includes("task") || lower.includes("todo")) {
                return `📋 Task created and scheduled.<br><br>✅ Added to your dashboard with smart deadline.`;
            }
            return `Understood. I've processed your request using Llama 3.2.<br><br>What else can I help you with today?`;
        }

        function newChat() {
            if (confirm("Start a new conversation?")) {
                document.getElementById('chat-window').innerHTML = `
                    <div class="max-w-2xl">
                        <p class="text-3xl font-medium">Hello again.</p>
                        <p class="text-neutral-600 mt-3">How can I assist you?</p>
                    </div>
                `;
            }
        }

        // Allow Enter key
        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
