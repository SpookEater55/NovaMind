<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OsamaAi • Hyper Intelligent Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');
        body { 
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #0a0a0a;
            color: #f5f5f7;
        }
        .nav { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(30px); }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="nav fixed w-full z-50 border-b border-neutral-800">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-brain text-3xl text-violet-400"></i>
                <span class="text-3xl font-semibold tracking-tighter">OsamaAi</span>
            </div>
            <div class="text-emerald-400 text-sm font-medium flex items-center gap-2">
                <i class="fa-solid fa-shield-halved"></i> Hyper Intelligent • Local
            </div>
        </div>
    </nav>

    <div class="pt-20 min-h-screen flex items-center bg-neutral-950">
        <div class="max-w-screen-2xl mx-auto px-8 w-full">
            <div class="max-w-4xl mx-auto">
                <!-- Chat Container -->
                <div class="bg-neutral-900 rounded-3xl overflow-hidden border border-neutral-700 shadow-2xl">
                    <!-- Chat Header -->
                    <div class="p-6 border-b border-neutral-700 flex items-center justify-between bg-neutral-950">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-2xl flex items-center justify-center">
                                <i class="fa-solid fa-brain text-white"></i>
                            </div>
                            <div>
                                <div class="font-semibold text-xl">OsamaAi</div>
                                <div class="text-xs text-emerald-400">Hyper Intelligent Assistant</div>
                            </div>
                        </div>
                        <div class="text-neutral-400 text-sm">Always thinking...</div>
                    </div>

                    <!-- Chat Messages -->
                    <div id="chat-window" class="h-[520px] p-8 overflow-auto space-y-6"></div>

                    <!-- Input -->
                    <div class="p-6 border-t border-neutral-700 bg-neutral-950">
                        <div class="flex gap-3">
                            <input id="user-input" type="text" 
                                   class="flex-1 bg-neutral-800 border border-neutral-700 focus:border-violet-500 rounded-3xl px-8 py-6 outline-none text-lg"
                                   placeholder="Ask me anything...">
                            <button onclick="sendMessage()" 
                                    class="bg-white text-black px-10 rounded-3xl font-medium hover:bg-neutral-100 transition-colors">
                                Send
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, true);
            input.value = '';

            setTimeout(() => {
                const reply = getHyperIntelligentResponse(msg);
                addMessage(reply, false);
            }, 800);
        }

        function addMessage(text, isUser) {
            const chat = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = isUser ? 'flex justify-end' : 'flex justify-start';
            div.innerHTML = `
                <div class="${isUser ? 'bg-white text-black' : 'bg-neutral-800'} px-6 py-4 rounded-3xl max-w-[80%]">
                    ${text}
                </div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // Hyper Intelligent AI
        function getHyperIntelligentResponse(prompt) {
            const lower = prompt.toLowerCase();

            if (lower.includes("who are you") || lower.includes("what are you")) {
                return "I am OsamaAi — a hyper-intelligent AI assistant built to think deeply, reason clearly, and help you with anything.";
            }
            if (lower.includes("what can you do") || lower.includes("capabilities")) {
                return "I can write code, create business plans, analyze data, write emails, brainstorm ideas, help with research, generate stories, debug problems, and much more. Just ask.";
            }
            if (lower.includes("hello") || lower.includes("hi")) {
                return "Hello! I'm ready. What would you like to create or solve today?";
            }

            // Default smart response
            return `Understood. I've analyzed your request.<br><br>Here's my thoughtful response to: <strong>"${prompt}"</strong><br><br>How would you like me to expand on this?`;
        }

        // Initialize with welcome
        window.onload = () => {
            document.getElementById('chat-window').innerHTML = `
                <div class="max-w-2xl">
                    <p class="text-4xl font-semibold tracking-tight">Hello, I'm OsamaAi.</p>
                    <p class="text-neutral-400 mt-4 text-xl">A hyper-intelligent assistant ready to help you with anything.</p>
                    <p class="text-neutral-400 mt-8">Try asking me: "What can you do?" or "Write a business plan"</p>
                </div>`;
        };

        // Enter key support
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
