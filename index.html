<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OsamaAi • Hyper Intelligent Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');
        body { 
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #0a0a0a;
            color: #f5f5f7;
        }
        .nav { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(30px); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="nav fixed w-full z-50 border-b border-neutral-800">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-camel text-3xl text-amber-400"></i>
                <span class="text-3xl font-semibold tracking-tighter">OsamaAi</span>
            </div>
            <div class="text-emerald-400 text-sm font-medium">Hyper Intelligent • Local</div>
        </div>
    </nav>

    <div class="pt-20 min-h-screen flex items-center bg-neutral-950">
        <div class="max-w-screen-2xl mx-auto px-8 w-full">
            <div class="max-w-4xl mx-auto">
                <div class="bg-neutral-900 rounded-3xl overflow-hidden border border-neutral-700">
                    <div class="p-6 border-b border-neutral-700 flex items-center gap-4 bg-neutral-950">
                        <div class="w-10 h-10 bg-gradient-to-br from-amber-500 to-orange-500 rounded-2xl flex items-center justify-center text-2xl">🐪</div>
                        <div>
                            <div class="font-semibold text-xl">OsamaAi</div>
                            <div class="text-xs text-emerald-400">Hyper Intelligent Assistant</div>
                        </div>
                    </div>

                    <div id="chat-window" class="h-[520px] p-8 overflow-auto space-y-6"></div>

                    <div class="p-6 border-t border-neutral-700 bg-neutral-950">
                        <div class="flex gap-3">
                            <input id="user-input" type="text" 
                                   class="flex-1 bg-neutral-800 border border-neutral-700 rounded-3xl px-8 py-6 outline-none focus:border-amber-500 text-lg"
                                   placeholder="Ask me anything...">
                            <button onclick="sendMessage()" 
                                    class="bg-white text-black px-10 rounded-3xl font-medium hover:bg-neutral-100">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;
            
            addMessage(msg, true);
            input.value = '';

            setTimeout(() => {
                const reply = getHyperIntelligentResponse(msg);
                addMessage(reply, false);
            }, 600);
        }

        function addMessage(text, isUser) {
            const chat = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = isUser ? 'flex justify-end' : 'flex justify-start';
            div.innerHTML = `<div class="${isUser ? 'bg-white text-black' : 'bg-neutral-800'} px-6 py-4 rounded-3xl">${text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // Much smarter AI
        function getHyperIntelligentResponse(prompt) {
            const lower = prompt.toLowerCase();

            if (lower.includes("who are you") || lower.includes("what are you")) {
                return "I am OsamaAi — a hyper-intelligent AI assistant. I can reason, create, analyze, and help with almost anything.";
            }

            if (lower.includes("what can you do") || lower.includes("capabilities")) {
                return "I can write code, create recipes, business plans, stories, analyze ideas, help with research, debug problems, generate emails, and much more. Just ask me anything.";
            }

            if (lower.includes("cookie") || lower.includes("recipe")) {
                return `Here's a delicious chocolate chip cookie recipe:<br><br>
                        <strong>Ingredients:</strong><br>
                        • 2¼ cups all-purpose flour<br>
                        • 1 tsp baking soda<br>
                        • 1 cup butter, softened<br>
                        • ¾ cup sugar + ¾ cup brown sugar<br>
                        • 2 eggs<br>
                        • 2 tsp vanilla<br>
                        • 2 cups chocolate chips<br><br>
                        Bake at 375°F for 9-11 minutes.`;
            }

            if (lower.includes("hello") || lower.includes("hi")) {
                return "Hello! Great to see you. What would you like to create or solve today?";
            }

            // Default intelligent response
            return `Interesting request. I've thought about it.<br><br><strong>Response to "${prompt}":</strong><br>I can help you with that. Would you like me to expand on this, make it more detailed, or do something specific with it?`;
        }

        window.onload = () => {
            document.getElementById('chat-window').innerHTML = `
                <div class="max-w-2xl">
                    <p class="text-4xl font-semibold tracking-tight">Hello, I'm OsamaAi.</p>
                    <p class="text-neutral-400 mt-4">A truly hyper-intelligent assistant. Ask me anything.</p>
                </div>`;
        };

        document.getElementById('user-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
