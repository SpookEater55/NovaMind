<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OsamaAi • Hyper Intelligent Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');
        body { 
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #0a0a0a;
            color: #f5f5f7;
        }
        .nav { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(30px); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="nav fixed w-full z-50 border-b border-neutral-800">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-camel text-3xl text-amber-400"></i>
                <span class="text-3xl font-semibold tracking-tighter">OsamaAi</span>
            </div>
            <div class="text-emerald-400 text-sm font-medium" id="status">Connecting...</div>
        </div>
    </nav>

    <div class="pt-20 min-h-screen flex items-center bg-neutral-950">
        <div class="max-w-screen-2xl mx-auto px-8 w-full">
            <div class="max-w-4xl mx-auto">
                <div class="bg-neutral-900 rounded-3xl overflow-hidden border border-neutral-700">
                    <div class="p-6 border-b border-neutral-700 flex items-center gap-4 bg-neutral-950">
                        <div class="w-10 h-10 bg-gradient-to-br from-amber-500 to-orange-500 rounded-2xl flex items-center justify-center text-2xl">🐪</div>
                        <div>
                            <div class="font-semibold text-xl">OsamaAi</div>
                            <div class="text-xs text-emerald-400">Hyper Intelligent Assistant</div>
                        </div>
                    </div>

                    <div id="chat-window" class="h-[520px] p-8 overflow-auto space-y-6"></div>

                    <div class="p-6 border-t border-neutral-700 bg-neutral-950">
                        <div class="flex gap-3">
                            <input id="user-input" type="text" class="flex-1 bg-neutral-800 border border-neutral-700 rounded-3xl px-8 py-6 outline-none focus:border-amber-500 text-lg" placeholder="Ask me anything...">
                            <button onclick="sendMessage()" class="bg-white text-black px-10 rounded-3xl font-medium hover:bg-neutral-100">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let GROQ_API_KEY = localStorage.getItem("osama_ai_key");

        if (!GROQ_API_KEY) {
            GROQ_API_KEY = prompt("Enter your Groq API Key (gsk_...):");
            if (GROQ_API_KEY) {
                localStorage.setItem("osama_ai_key", GROQ_API_KEY);
            }
        }

        document.getElementById("status").innerHTML = GROQ_API_KEY ? "✅ Connected" : "❌ No Key";

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, true);
            input.value = '';
            addMessage("Thinking...", false);

            if (!GROQ_API_KEY) {
                replaceLastMessage("Please refresh and enter your Groq API key.");
                return;
            }

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-70b-versatile",
                        messages: [{ role: "user", content: msg }],
                        temperature: 0.7,
                        max_tokens: 1024
                    })
                });

                const data = await res.json();
                const reply = data.choices[0].message.content;
                replaceLastMessage(reply);
            } catch (e) {
                replaceLastMessage("Connection error. Check your API key.");
            }
        }

        function addMessage(text, isUser) {
            const chat = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = isUser ? 'flex justify-end' : 'flex justify-start';
            div.innerHTML = `<div class="${isUser ? 'bg-white text-black' : 'bg-neutral-800'} px-6 py-4 rounded-3xl">${text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function replaceLastMessage(newText) {
            const chat = document.getElementById('chat-window');
            if (chat.lastChild) chat.lastChild.remove();
            addMessage(newText, false);
        }

        window.onload = () => {
            document.getElementById('chat-window').innerHTML = `
                <div class="max-w-2xl">
                    <p class="text-4xl font-semibold tracking-tight">Hello, I'm OsamaAi.</p>
                    <p class="text-neutral-400 mt-4">Hyper Intelligent Assistant.<br>Ask me anything.</p>
                </div>`;
        };

        document.getElementById('user-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
