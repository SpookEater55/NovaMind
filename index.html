<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com;">
    <title>NovaMind • Front Desk Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');
        body { 
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f5f5f7;
        }
        .chat-bubble { max-width: 75%; word-break: break-word; }
    </style>
</head>
<body class="min-h-screen">

    <div class="max-w-screen-2xl mx-auto flex h-screen">
        
        <!-- Sidebar -->
        <div class="w-80 bg-white border-r border-neutral-200 p-8 flex flex-col">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-9 h-9 bg-black rounded-2xl flex items-center justify-center text-white font-bold">N</div>
                <div>
                    <div class="font-semibold text-2xl tracking-tight">NovaMind</div>
                    <div class="text-xs text-emerald-600 font-medium">Llama 3.2 • Secure</div>
                </div>
            </div>
            
            <h1 class="text-3xl font-semibold mb-2">Front Desk Assistant</h1>
            <p class="text-neutral-500 mb-8">Your intelligent hotel operations helper</p>
            
            <div onclick="newChat()" class="flex items-center gap-3 p-4 hover:bg-neutral-100 rounded-3xl cursor-pointer transition-colors">
                <i class="fa-solid fa-plus text-lg"></i>
                <span class="font-medium">New Conversation</span>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="flex-1 flex flex-col">
            <!-- Header -->
            <div class="h-16 border-b bg-white flex items-center px-8">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-concierge-bell text-2xl text-emerald-600"></i>
                    <div class="font-medium text-xl">Front Desk Assistant</div>
                </div>
                <div class="ml-auto text-sm text-emerald-600 flex items-center gap-2">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>Local & Secure</span>
                </div>
            </div>

            <!-- Chat Window -->
            <div id="chat-window" class="flex-1 overflow-auto p-8 space-y-8 bg-neutral-50">
                <div class="max-w-2xl">
                    <p class="text-4xl font-semibold tracking-tight">Hello! How can I help you today?</p>
                    <p class="text-neutral-600 mt-4 text-lg">I can create welcome emails, manage reservations, generate reports, and handle guest requests.</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-8 bg-white border-t">
                <div class="max-w-3xl mx-auto relative">
                    <input id="user-input" type="text" 
                           class="w-full bg-white border border-neutral-300 focus:border-black rounded-3xl px-8 py-7 text-lg outline-none transition-all"
                           placeholder="Type here... (e.g. Create welcome email for Mr. Smith)">
                    <button onclick="sendMessage()" 
                            class="absolute right-4 top-1/2 -translate-y-1/2 bg-black text-white px-10 py-5 rounded-3xl hover:bg-neutral-800 transition-colors">
                        Send
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function sanitizeInput(str) {
            return str.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            let message = input.value.trim();
            if (!message) return;

            message = sanitizeInput(message);
            addMessage(message, 'user');
            input.value = '';

            setTimeout(() => {
                const response = getAIResponse(message);
                addMessage(response, 'ai');
            }, 700);
        }

        function addMessage(text, sender) {
            const chat = document.getElementById('chat-window');
            const bubble = document.createElement('div');
            
            if (sender === 'user') {
                bubble.className = 'flex justify-end';
                bubble.innerHTML = `<div class="chat-bubble bg-black text-white px-6 py-4 rounded-3xl rounded-br-none">${text}</div>`;
            } else {
                bubble.className = 'flex justify-start';
                bubble.innerHTML = `<div class="chat-bubble bg-white border border-neutral-200 px-6 py-4 rounded-3xl rounded-bl-none">${text}</div>`;
            }
            chat.appendChild(bubble);
            chat.scrollTop = chat.scrollHeight;
        }

        function getAIResponse(prompt) {
            const lower = prompt.toLowerCase();
            if (lower.includes("welcome") || lower.includes("email")) {
                return `✅ Welcome email for the guest has been created successfully.`;
            }
            if (lower.includes("reservation") || lower.includes("booking")) {
                return `📅 Reservation confirmed. Confirmation number: NM-${Math.floor(100000 + Math.random()*900000)}`;
            }
            if (lower.includes("report") || lower.includes("file")) {
                return `📄 Report file created securely on your system.`;
            }
            return `✅ Request processed.<br><br>How else can I assist you at the front desk?`;
        }

        function newChat() {
            if (confirm("Start a new conversation?")) {
                document.getElementById('chat-window').innerHTML = `
                    <div class="max-w-2xl">
                        <p class="text-4xl font-semibold tracking-tight">Hello again!</p>
                        <p class="text-neutral-600 mt-4 text-lg">How can I help you today?</p>
                    </div>
                `;
            }
        }

        document.getElementById('user-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
